<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Solid Deep Indigo Background with rounded corners -->
  <rect width="512" height="512" rx="110" fill="#2C3E50"/>
  
  <!-- Minimalist Book / Shelf Icon -->
  <g transform="translate(256, 256)">
    <!-- Base Book Shape -->
    <path d="M0 -120 L-140 -80 L-140 100 C-140 100, 0 60, 0 60 L0 -120 Z" fill="white" opacity="0.95"/>
    <path d="M0 -120 L140 -80 L140 100 C140 100, 0 60, 0 60 L0 -120 Z" fill="white" opacity="0.75"/>
    
    <!-- Muted Teal Accent (Represents the "Shelf" or Spine) -->
    <rect x="-6" y="-120" width="12" height="180" rx="6" fill="#4C9F8A"/>
    
    <!-- Abstract Knowledge Lines -->
    <g stroke="#2C3E50" stroke-width="8" stroke-linecap="round" opacity="0.15">
      <path d="M-100 -20 L-40 -35"/>
      <path d="M-100 15 L-40 0"/>
      <path d="M40 -35 L100 -20"/>
      <path d="M40 0 L100 15"/>
    </g>
  </g>
</svg>
